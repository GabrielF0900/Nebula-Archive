<svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradientes de fundo -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#1a1a3f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0d2d4a;stop-opacity:1" />
        </linearGradient>

        <!-- Gradientes da logo Nebula -->
        <linearGradient id="gradient1" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stopColor="#00D4FF" />
            <stop offset="100%" stopColor="#00D4FF" stopOpacity="0.3" />
        </linearGradient>
        
        <linearGradient id="gradient2" x1="8" y1="20" x2="32" y2="20">
            <stop offset="0%" stopColor="#00D4FF" stopOpacity="0.2" />
            <stop offset="50%" stopColor="#00D4FF" />
            <stop offset="100%" stopColor="#00D4FF" stopOpacity="0.2" />
        </linearGradient>
        
        <radialGradient id="gradient3" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#00FFFF" />
            <stop offset="100%" stopColor="#00D4FF" />
        </radialGradient>

        <!-- Filtro de sombra -->
        <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3" />
        </filter>

        <!-- Filtro de glow -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Fundo base -->
    <rect width="1200" height="627" fill="url(#bgGradient)" />

    <!-- Elementos decorativos - stars -->
    <circle cx="150" cy="100" r="1.5" fill="#ffffff" opacity="0.6" />
    <circle cx="300" cy="80" r="1" fill="#ffffff" opacity="0.4" />
    <circle cx="1050" cy="120" r="1.5" fill="#ffffff" opacity="0.5" />
    <circle cx="1100" cy="500" r="1" fill="#ffffff" opacity="0.4" />
    <circle cx="200" cy="550" r="1.2" fill="#ffffff" opacity="0.5" />
    <circle cx="950" cy="580" r="1" fill="#ffffff" opacity="0.3" />

    <!-- Logo Nebula escalada (4x maior) -->
    <g filter="url(#shadow)" transform="translate(280, 260) scale(4)">
        <!-- Outer ring -->
        <circle cx="20" cy="20" r="18" stroke="url(#gradient1)" strokeWidth="1.5" fill="none" />
        <!-- Inner orbital path -->
        <ellipse cx="20" cy="20" rx="12" ry="6" stroke="url(#gradient2)" strokeWidth="1" fill="none" transform="rotate(-30 20 20)" />
        <!-- Core -->
        <circle cx="20" cy="20" r="4" fill="url(#gradient3)" />
        <!-- Orbital dots -->
        <circle cx="32" cy="14" r="1.5" fill="#00D4FF" />
        <circle cx="8" cy="26" r="1" fill="#00D4FF" opacity="0.6" />
    </g>

    <!-- Título principal -->
    <text x="750" y="310" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" filter="url(#shadow)">
        NEBULA-ARCHIVE
    </text>

    <!-- Subtítulo -->
    <text x="750" y="365" font-family="Arial, sans-serif" font-size="30" fill="#00D4FF" opacity="0.9" filter="url(#shadow)">
        em Desenvolvimento
    </text>

    <!-- Tagline -->
    <text x="750" y="405" font-family="Arial, sans-serif" font-size="14" fill="#e0e7ff" opacity="0.7">
        Enterprise Serverless Media Orchestrator
    </text>

    <!-- Linha decorativa -->
    <line x1="400" y1="430" x2="1000" y2="430" stroke="#00D4FF" stroke-width="1" opacity="0.5" />

    <!-- Ícones de tecnologia no rodapé -->
    <g opacity="0.6">
        <text x="420" y="490" font-family="monospace" font-size="14" fill="#00D4FF">AWS</text>
        <text x="520" y="490" font-family="monospace" font-size="14" fill="#00D4FF">NestJS</text>
        <text x="630" y="490" font-family="monospace" font-size="14" fill="#00D4FF">TypeScript</text>
        <text x="800" y="490" font-family="monospace" font-size="14" fill="#00D4FF">Serverless</text>
    </g>
</svg>