<svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradientes de fundo -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#1a1a3f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0d2d4a;stop-opacity:1" />
        </linearGradient>

        <!-- Gradientes da logo Nebula -->
        <linearGradient id="gradient1" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stopColor="#00D4FF" />
            <stop offset="100%" stopColor="#00D4FF" stopOpacity="0.3" />
        </linearGradient>
        
        <linearGradient id="gradient2" x1="8" y1="20" x2="32" y2="20">
            <stop offset="0%" stopColor="#00D4FF" stopOpacity="0.2" />
            <stop offset="50%" stopColor="#00D4FF" />
            <stop offset="100%" stopColor="#00D4FF" stopOpacity="0.2" />
        </linearGradient>
        
        <radialGradient id="gradient3" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#00FFFF" />
            <stop offset="100%" stopColor="#00D4FF" />
        </radialGradient>

        <!-- Filtro de sombra -->
        <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3" />
        </filter>

        <!-- Filtro de glow -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Fundo base -->
    <rect width="1200" height="627" fill="url(#bgGradient)" />

    <!-- Elementos decorativos - stars (discretos) -->
    <circle cx="100" cy="80" r="1" fill="#ffffff" opacity="0.3" />
    <circle cx="1100" cy="100" r="1.2" fill="#ffffff" opacity="0.3" />
    <circle cx="150" cy="550" r="0.8" fill="#ffffff" opacity="0.2" />
    <circle cx="1080" cy="560" r="1" fill="#ffffff" opacity="0.2" />

    <!-- LOGO: Nebula (à esquerda, centralizada verticalmente) -->
    <g filter="url(#shadow)" transform="translate(120, 280)">
        <!-- Outer ring -->
        <circle cx="80" cy="80" r="72" stroke="url(#gradient1)" strokeWidth="6" fill="none" />
        <!-- Inner orbital path -->
        <ellipse cx="80" cy="80" rx="48" ry="24" stroke="url(#gradient2)" strokeWidth="4" fill="none" transform="rotate(-30 80 80)" />
        <!-- Core -->
        <circle cx="80" cy="80" r="16" fill="url(#gradient3)" />
        <!-- Orbital dots -->
        <circle cx="128" cy="56" r="6" fill="#00D4FF" />
        <circle cx="32" cy="104" r="4" fill="#00D4FF" opacity="0.6" />
    </g>

    <!-- TEXTOS (à direita da logo) -->
    <!-- Título principal -->
    <text x="550" y="300" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" filter="url(#shadow)">
        NEBULA-ARCHIVE
    </text>

    <!-- Subtítulo -->
    <text x="550" y="355" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#00D4FF" opacity="0.95" filter="url(#shadow)">
        em Desenvolvimento
    </text>

    <!-- Tagline -->
    <text x="550" y="395" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c7d2fe" opacity="0.8">
        Enterprise Serverless Media Orchestrator
    </text>

    <!-- Linha decorativa -->
    <line x1="550" y1="410" x2="1050" y2="410" stroke="#00D4FF" stroke-width="1.5" opacity="0.6" />

    <!-- Tech stack no rodapé -->
    <g opacity="0.7">
        <text x="550" y="465" font-family="monospace" font-size="12" font-weight="500" fill="#00D4FF">AWS</text>
        <text x="650" y="465" font-family="monospace" font-size="12" font-weight="500" fill="#00D4FF">NestJS</text>
        <text x="780" y="465" font-family="monospace" font-size="12" font-weight="500" fill="#00D4FF">TypeScript</text>
        <text x="950" y="465" font-family="monospace" font-size="12" font-weight="500" fill="#00D4FF">Serverless</text>
    </g>
</svg>