<svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradientes de fundo -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#1a1a3f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0d2d4a;stop-opacity:1" />
        </linearGradient>

        <!-- Gradientes da logo Nebula -->
        <linearGradient id="gradient1" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stopColor="#00D4FF" />
            <stop offset="100%" stopColor="#00D4FF" stopOpacity="0.3" />
        </linearGradient>
        
        <linearGradient id="gradient2" x1="8" y1="20" x2="32" y2="20">
            <stop offset="0%" stopColor="#00D4FF" stopOpacity="0.2" />
            <stop offset="50%" stopColor="#00D4FF" />
            <stop offset="100%" stopColor="#00D4FF" stopOpacity="0.2" />
        </linearGradient>
        
        <radialGradient id="gradient3" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#00FFFF" />
            <stop offset="100%" stopColor="#00D4FF" />
        </radialGradient>

        <!-- Filtro de sombra -->
        <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3" />
        </filter>

        <!-- Filtro de glow -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Fundo base -->
    <rect width="1200" height="627" fill="url(#bgGradient)" />

    <!-- Elementos decorativos - stars -->
    <circle cx="150" cy="100" r="1.5" fill="#ffffff" opacity="0.6" />
    <circle cx="300" cy="80" r="1" fill="#ffffff" opacity="0.4" />
    <circle cx="1050" cy="120" r="1.5" fill="#ffffff" opacity="0.5" />
    <circle cx="1100" cy="500" r="1" fill="#ffffff" opacity="0.4" />
    <circle cx="200" cy="550" r="1.2" fill="#ffffff" opacity="0.5" />
    <circle cx="950" cy="580" r="1" fill="#ffffff" opacity="0.3" />

    <!-- Círculos decorativos com gradiente nebula -->
    <circle cx="600" cy="313.5" r="200" fill="url(#nebulaGradient)" opacity="0.4"
        filter="url(#glow)" />
    <circle cx="600" cy="313.5" r="180" fill="url(#nebulaGradient)" opacity="0.5"
        filter="url(#glow)" />

    <!-- Brilho externo -->
    <circle cx="600" cy="313.5" r="220" fill="url(#glowGradient)" filter="url(#glow)" />

    <!-- Logo - Representação de Nebula com circulos concêntricos -->
    <g filter="url(#shadow)">
        <!-- Círculos concêntricos - representa galaxia/nebula -->
        <circle cx="600" cy="280" r="120" fill="none" stroke="#7c3aed" stroke-width="2"
            opacity="0.8" />
        <circle cx="600" cy="280" r="100" fill="none" stroke="#3b82f6" stroke-width="1.5"
            opacity="0.6" />
        <circle cx="600" cy="280" r="80" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5" />

        <!-- Círculo central com gradiente -->
        <circle cx="600" cy="280" r="60" fill="url(#nebulaGradient)" opacity="0.9" />

        <!-- Estrela central com brilho -->
        <circle cx="600" cy="280" r="25" fill="#ffffff" opacity="0.3" filter="url(#glow)" />
        <circle cx="600" cy="280" r="15" fill="#fbbf24" opacity="0.8" />
        <circle cx="600" cy="280" r="10" fill="#ffffff" opacity="0.9" />

        <!-- Orbitas decorativas -->
        <circle cx="600" cy="280" r="95" fill="none" stroke="#7c3aed" stroke-width="0.5"
            opacity="0.3" stroke-dasharray="5,5" />
        <circle cx="600" cy="280" r="75" fill="none" stroke="#3b82f6" stroke-width="0.5"
            opacity="0.3" stroke-dasharray="5,5" transform="rotate(45 600 280)" />
    </g>

    <!-- Título principal -->
    <text x="600" y="420" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
        text-anchor="middle" fill="#ffffff" filter="url(#shadow)">
        NEBULA-ARCHIVE
    </text>

    <!-- Subtítulo -->
    <text x="600" y="480" font-family="Arial, sans-serif" font-size="36" text-anchor="middle"
        fill="#3b82f6" opacity="0.9" filter="url(#shadow)">
        em Desenvolvimento
    </text>

    <!-- Tagline -->
    <text x="600" y="530" font-family="Arial, sans-serif" font-size="16" text-anchor="middle"
        fill="#e0e7ff" opacity="0.7">
        Enterprise Serverless Media Orchestrator
    </text>

    <!-- Linha decorativa -->
    <line x1="350" y1="570" x2="850" y2="570" stroke="#3b82f6" stroke-width="2" opacity="0.5" />

    <!-- Ícones de tecnologia no rodapé -->
    <g opacity="0.6">
        <text x="420" y="595" font-family="monospace" font-size="14" fill="#06b6d4">AWS</text>
        <text x="520" y="595" font-family="monospace" font-size="14" fill="#3b82f6">NestJS</text>
        <text x="630" y="595" font-family="monospace" font-size="14" fill="#7c3aed">TypeScript</text>
        <text x="800" y="595" font-family="monospace" font-size="14" fill="#06b6d4">Serverless</text>
    </g>
</svg>